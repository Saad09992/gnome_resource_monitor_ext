<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Monitor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: rgba(15, 23, 42, 0.78);
        --panel-border: rgba(148, 163, 184, 0.16);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent-2: #22c55e;
        --shadow: 0 18px 48px rgba(2, 6, 23, 0.45);
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(
            circle at top,
            rgba(56, 189, 248, 0.18),
            transparent 30%
          ),
          radial-gradient(
            circle at 80% 20%,
            rgba(34, 197, 94, 0.14),
            transparent 24%
          ),
          linear-gradient(180deg, #07101d 0%, #0b1020 100%);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 24px;
      }

      h1 {
        color: var(--text);
        font-size: clamp(2rem, 4vw, 3rem);
        text-align: center;
        margin-bottom: 18px;
        letter-spacing: 0.02em;
      }

      .container {
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
      }

      .top-section {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }

      section {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(16px);
        padding: 20px;
        border-radius: 18px;
        box-shadow: var(--shadow);
      }

      .host-info,
      .memory-info {
        flex: 1;
        min-width: 300px;
      }

      .cpu-info {
        width: 100%;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 16px;
        padding: 6px 2px 10px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid var(--panel-border);
        color: var(--muted);
        font-size: 0.9rem;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent-2);
        box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.14);
      }

      h2 {
        color: #dbeafe;
        font-size: 1.4rem;
        margin-bottom: 12px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.18);
        padding-bottom: 8px;
      }

      ul {
        list-style: none;
      }

      li {
        padding: 10px 0;
        font-size: 1rem;
        border-bottom: 1px solid rgba(148, 163, 184, 0.12);
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      li:last-child {
        border-bottom: none;
      }

      strong {
        color: #f8fafc;
        font-weight: 600;
      }

      .value {
        color: var(--muted);
        text-align: right;
        word-break: break-word;
      }

      .cpu-core {
        background: rgba(15, 23, 42, 0.7);
        padding: 14px;
        margin-bottom: 12px;
        border-left: 4px solid var(--accent);
        border-radius: 14px;
        font-size: 0.98rem;
      }

      .cpu-core:last-child {
        margin-bottom: 0;
      }

      .disk-partition {
        background: rgba(15, 23, 42, 0.7);
        padding: 14px;
        margin-bottom: 12px;
        border-left: 4px solid var(--accent-2);
        border-radius: 14px;
        font-size: 0.98rem;
      }

      .cpu-core-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
      }

      .cpu-model {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .progress {
        height: 10px;
        width: 100%;
        background: rgba(148, 163, 184, 0.14);
        border-radius: 999px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), #7dd3fc);
        border-radius: inherit;
        transition: width 0.35s ease;
      }

      @media (max-width: 768px) {
        body {
          padding: 16px;
        }

        .hero {
          flex-direction: column;
          align-items: start;
        }

        .top-section {
          flex-direction: column;
        }

        .host-info,
        .memory-info {
          width: 100%;
        }

        h1 {
          font-size: 1.8rem;
        }

        h2 {
          font-size: 1.2rem;
        }

        li {
          font-size: 1rem;
        }

        .cpu-core {
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="hero">
        <div>
          <h1>System Monitor</h1>
          <p class="subtitle">
            Live host, memory, and CPU stats over WebSocket
          </p>
        </div>
        <div class="status-pill" id="connection-status">
          <span class="status-dot"></span>
          <span>Connecting...</span>
        </div>
      </header>

      <div class="top-section">
        <section class="host-info">
          <h2>Host Information</h2>
          <ul>
            <li>
              <strong>Hostname</strong
              ><span class="value" id="hostname">-</span>
            </li>
            <li><strong>OS</strong><span class="value" id="os">-</span></li>
            <li>
              <strong>Uptime</strong><span class="value" id="uptime">-</span>
            </li>
          </ul>
        </section>

        <section class="memory-info">
          <h2>Memory Information</h2>
          <ul>
            <li>
              <strong>Total</strong
              ><span class="value" id="total-memory">-</span>
            </li>
            <li>
              <strong>Used</strong><span class="value" id="used-memory">-</span>
            </li>
            <li>
              <strong>Free</strong><span class="value" id="free-memory">-</span>
            </li>
            <li>
              <strong>Usage</strong
              ><span class="value" id="memory-percentage">-</span>
            </li>
          </ul>
        </section>
        <section class="network-info">
          <h2>Network Information</h2>
          <ul>
            <li>
              <strong>Send</strong><span class="value" id="net-send">-</span>
            </li>
            <li>
              <strong>Receive</strong
              ><span class="value" id="net-receive">-</span>
            </li>
          </ul>
        </section>
      </div>

      <section class="cpu-info" id="cpu-info">
        <h2>CPU Information</h2>
        <div id="cpu-cores"></div>
      </section>

      <section class="disk-info" id="disk-info">
        <h2>Disk Information</h2>
        <div id="disk-partitions"></div>
      </section>
    </div>
  </body>
  <script>
    const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
    const ws = new WebSocket(`${wsProtocol}//${window.location.host}/stats`);

    ws.onopen = () => setConnectionStatus("Connected", true);

    ws.onclose = () => setConnectionStatus("Disconnected", false);

    ws.onerror = () => setConnectionStatus("Connection error", false);

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      updateHostInfo(data.HOST);
      updateMemoryInfo(data.MEM);
      updateCpuInfo(data.CPU);
      updateDiskInfo(data.DISK ?? data.Disk ?? data.disk ?? null);
      updateNetInfo(data.Net ?? data.NET ?? data.net ?? null);
      setConnectionStatus("Live", true);
    };

    function updateHostInfo(host) {
      document.getElementById("hostname").textContent = host?.Host ?? "-";
      document.getElementById("os").textContent = host?.Os ?? "-";
      document.getElementById("uptime").textContent = formatUptime(
        host?.Uptime ?? 0,
      );
    }

    function updateMemoryInfo(memory) {
      document.getElementById("total-memory").textContent = formatSize(
        memory?.Total ?? 0,
      );
      document.getElementById("used-memory").textContent = formatSize(
        memory?.Used ?? 0,
      );
      document.getElementById("free-memory").textContent = formatSize(
        memory?.Free ?? 0,
      );
      document.getElementById("memory-percentage").textContent =
        `${Number(memory?.Percentage ?? 0).toFixed(1)}%`;
    }

    function updateCpuInfo(cpu) {
      const cpuCoreContainer = document.getElementById("cpu-cores");
      cpuCoreContainer.innerHTML = "";

      const cores = Array.isArray(cpu) ? cpu : [];

      if (!cores.length) {
        cpuCoreContainer.innerHTML =
          '<div class="cpu-core">No CPU data available.</div>';
        return;
      }

      cores.forEach((core, index) => {
        const coreDiv = document.createElement("div");
        coreDiv.classList.add("cpu-core");
        const usage = Number(core?.Usage ?? 0);
        coreDiv.innerHTML = `
          <div class="cpu-core-header">
            <strong>Core ${core?.Core ?? index}</strong>
            <span class="cpu-model">${escapeHtml(core?.Model ?? "Unknown model")}</span>
          </div>
          <div class="progress" aria-label="CPU usage">
            <div class="progress-bar" style="width: ${Math.max(0, Math.min(100, usage))}%"></div>
          </div>
          <div class="value" style="margin-top: 8px;">${usage.toFixed(1)}%</div>
        `;
        cpuCoreContainer.appendChild(coreDiv);
      });
    }

    function formatSize(megabytes) {
      const value = Number(megabytes) || 0;
      if (value >= 1024) {
        return `${(value / 1024).toFixed(2)} GB`;
      }
      return `${value.toFixed(2)} MB`;
    }

    function formatBytes(bytes) {
      const value = Number(bytes) || 0;
      if (value === 0) return "0 B";
      const units = ["B", "KB", "MB", "GB", "TB"];
      const i = Math.floor(Math.log(value) / Math.log(1024));
      return `${(value / Math.pow(1024, i)).toFixed(2)} ${units[i]}`;
    }

    function updateDiskInfo(disk) {
      const container = document.getElementById("disk-partitions");
      container.innerHTML = "";

      const d = disk ?? null;
      if (!d) {
        container.innerHTML =
          '<div class="disk-partition">No disk data available.</div>';
        return;
      }
      const part = document.createElement("div");
      part.classList.add("disk-partition");
      part.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <strong>${escapeHtml(d?.Path ?? d?.path ?? "Unknown")}</strong>
          <span class="cpu-model">${escapeHtml(d?.Fstype ?? d?.fstype ?? "")}</span>
        </div>
        <ul>
          <li><strong>Total</strong><span class="value">${formatBytes(d?.Total ?? d?.total ?? 0)}</span></li>
          <li><strong>Used</strong><span class="value">${formatBytes(d?.Used ?? d?.used ?? 0)}</span></li>
          <li><strong>Free</strong><span class="value">${formatBytes(d?.Free ?? d?.free ?? 0)}</span></li>
          <li><strong>Usage</strong><span class="value">${Number(d?.UsedPercent ?? d?.usedPercent ?? d?.usedpercent ?? 0).toFixed(1)}%</span></li>
          <li><strong>Inodes (total)</strong><span class="value">${Number(d?.InodesTotal ?? d?.inodesTotal ?? 0)}</span></li>
          <li><strong>Inodes (used)</strong><span class="value">${Number(d?.InodesUsed ?? d?.inodesUsed ?? 0)}</span></li>
          <li><strong>Inodes (free)</strong><span class="value">${Number(d?.InodesFree ?? d?.inodesFree ?? 0)}</span></li>
          <li><strong>Inodes usage</strong><span class="value">${Number(d?.InodesUsedPercent ?? d?.inodesUsedPercent ?? 0).toFixed(1)}%</span></li>
        </ul>
      `;
      container.appendChild(part);
    }

    function updateNetInfo(net) {
      const sendEl = document.getElementById("net-send");
      const recvEl = document.getElementById("net-receive");

      if (!sendEl || !recvEl) return; // elements missing

      if (!net) {
        sendEl.textContent = "-";
        recvEl.textContent = "-";
        return;
      }

      const sendKb = Number(net?.SendSpeed ?? net?.sendSpeed ?? 0);
      const recvKb = Number(net?.ReceiveSpeed ?? net?.receiveSpeed ?? 0);

      sendEl.textContent = `${sendKb.toFixed(2)} KB/s`;
      recvEl.textContent = `${recvKb.toFixed(2)} KB/s`;
    }

    function formatUptime(minutes) {
      const totalMinutes = Math.max(0, Math.floor(Number(minutes) || 0));
      const days = Math.floor(totalMinutes / 1440);
      const hours = Math.floor((totalMinutes % 1440) / 60);
      const mins = totalMinutes % 60;

      const parts = [];
      if (days) parts.push(`${days}d`);
      if (hours || days) parts.push(`${hours}h`);
      parts.push(`${mins}m`);
      return parts.join(" ");
    }

    function setConnectionStatus(text, connected) {
      const status = document.getElementById("connection-status");
      status.innerHTML = `
        <span class="status-dot" style="background: ${connected ? "var(--accent-2)" : "#ef4444"}; box-shadow: 0 0 0 5px ${connected ? "rgba(34, 197, 94, 0.14)" : "rgba(239, 68, 68, 0.14)"};"></span>
        <span>${text}</span>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  </script>
</html>
